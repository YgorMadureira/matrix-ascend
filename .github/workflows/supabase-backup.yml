name: Supabase Daily Backup

on:
  schedule:
    # Roda todos os dias às 03:00 UTC (Meia-noite no horário de Brasília)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Permite disparar o backup manualmente no botão "Run workflow"

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Obter data e hora atuais
        id: timestamp
        run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Extrair Backup do Banco de Dados (Supabase)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Erro: A chave SUPABASE_DB_URL não foi encontrada nas secrets do repositório!"
            echo "Vá em Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          
          echo "Iniciando download do banco de dados..."
          
          # pg_dump exporta a estrutura e os dados.
          # --clean e --if-exists garantem que o SQL vai deletar tabelas velhas antes de restaurar
          # --no-owner e --no-privileges evitam dores de cabeça com permissões ao restaurar o banco
          pg_dump "$SUPABASE_DB_URL" --clean --if-exists --no-owner --no-privileges > backup_${{ env.date }}.sql
          
          echo "Backup concluído! Compactando arquivo..."
          gzip backup_${{ env.date }}.sql

      - name: Salvar Arquivo no GitHub (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: matriz-treinamentos-backup-${{ env.date }}
          path: backup_${{ env.date }}.sql.gz
          # O GitHub armazena de graça. 30 dias é um tempo seguro e econômico.
          retention-days: 30
